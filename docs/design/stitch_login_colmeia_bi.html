<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

            background-color: #f4faff;

<body class="bg-background font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col items-center justify-center hex-bg px-6">
<!-- Brand Header -->
<header class="mb-12 flex flex-col items-center animate-fade-in">
<div class="w-20 h-20 mb-6 flex items-center justify-center bg-primary-container rounded-xl shadow-lg shadow-primary/10">
<span class="material-symbols-outlined text-on-primary-container text-5xl" data-icon="hive">hive</span>
</div>
<h1 class="font-headline text-3xl font-black tracking-widest text-primary uppercase">Colmeia BI</h1>
</header>
<!-- Login Container -->
<main class="w-full max-w-[480px]">
<div class="glass-panel p-10 md:p-12 rounded-full shadow-2xl shadow-on-surface/5 flex flex-col gap-10">
<!-- Welcome Message -->
<div class="space-y-3">
<h2 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface">Welcome back</h2>
<p class="text-on-surface-variant text-base leading-relaxed">Please enter your credentials to access the hive.</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-8" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label text-sm font-semibold uppercase tracking-wider text-on-surface-variant flex items-center gap-2" for="email">
<span class="material-symbols-outlined text-lg" data-icon="alternate_email">alternate_email</span>
                    User or Email
                </label>
<input class="w-full bg-surface-container-low border-0 rounded-xl px-5 py-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary-container transition-all outline-none" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label text-sm font-semibold uppercase tracking-wider text-on-surface-variant flex items-center gap-2" for="password">
<span class="material-symbols-outlined text-lg" data-icon="lock">lock</span>
                        Password
                    </label>
<a class="text-sm font-semibold text-secondary hover:text-secondary-container transition-colors tracking-tight" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 rounded-xl px-5 py-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary-container transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary-container cursor-pointer bg-surface-container-low" id="remember" name="remember" type="checkbox"/>
<label class="text-sm font-medium text-on-surface-variant cursor-pointer select-none" for="remember">Keep me logged in</label>
</div>
<!-- Submit Button -->
<button class="w-full group bg-primary-container text-on-primary-container font-headline font-bold text-lg py-5 rounded-full flex items-center justify-center gap-3 shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all" type="submit">
                Sign into Dashboard
                <span class="material-symbols-outlined transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Secondary Action -->
<div class="pt-2 text-center">
<p class="text-on-surface-variant text-sm">
                New to the ecosystem? 
                <a class="ml-2 font-bold text-primary hover:text-primary-container transition-colors decoration-2 underline-offset-4" href="#">Request Access</a>
</p>
</div>
</div>
</main>
<!-- Footer Area -->
<footer class="mt-16 text-center space-y-2">
<p class="font-label text-xs uppercase tracking-[0.2em] text-outline opacity-60">
        © 2024 The Synthesized Hive. All rights reserved.
    </p>
<p class="font-label text-[10px] uppercase tracking-widest text-outline opacity-40">
        Version 2.4.0-Stable // Build 8821
    </p>
</footer>
